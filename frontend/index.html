<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooling System Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        /* CSS Variables for theming */
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #0ea5e9;
            --accent-secondary: #f43f5e;
            --status-ok: #22c55e;
            --status-warning: #f97316;
            --status-error: #ef4444;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Error Banner */
        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--status-error);
            color: var(--status-error);
            padding: 12px 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-banner.visible {
            display: flex;
        }

        .error-banner::before {
            content: "⚠";
            font-size: 1.2rem;
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .metric-unit {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .metric-subtext {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-ok {
            background: rgba(34, 197, 94, 0.15);
            color: var(--status-ok);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-warning {
            background: rgba(249, 115, 22, 0.15);
            color: var(--status-warning);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .status-error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chart-legend {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.temp-in {
            background: var(--accent-primary);
        }

        .legend-dot.temp-out {
            background: var(--accent-secondary);
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px 0;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-ok);
            animation: pulse 2s infinite;
        }

        .connection-status.error .connection-dot {
            background: var(--status-error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-card) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5rem;
            }

            .metric-value {
                font-size: 2rem;
            }

            .chart-wrapper {
                height: 280px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cooling System Dashboard</h1>
            <p>Real-time monitoring of chiller temperatures and system status</p>
        </header>

        <div id="error-banner" class="error-banner"></div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Chiller Temp In</div>
                <div class="metric-value">
                    <span id="temp-in">--</span>
                    <span class="metric-unit">°C</span>
                </div>
                <div class="metric-subtext">Input temperature</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Chiller Temp Out</div>
                <div class="metric-value">
                    <span id="temp-out">--</span>
                    <span class="metric-unit">°C</span>
                </div>
                <div class="metric-subtext">Output temperature</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">System Status</div>
                <div id="status-container">
                    <span id="status" class="status-badge">--</span>
                </div>
                <div class="metric-subtext">Current operational status</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Temperature Trends</div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <div class="legend-dot temp-in"></div>
                        <span>Temp In</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot temp-out"></div>
                        <span>Temp Out</span>
                    </div>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

        <footer>
            <div id="connection-status" class="connection-status">
                <div class="connection-dot"></div>
                <span id="last-updated">Connecting...</span>
            </div>
        </footer>
    </div>

    <script>
        /**
         * Cooling System Dashboard - Frontend
         * Production-ready dashboard with Chart.js integration
         */

        // Configuration
        const CONFIG = {
            API_URL: 'http://127.0.0.1:5001/all',
            REFRESH_INTERVAL: 5000, // 5 seconds
            MAX_DATA_POINTS: 50,      // Limit chart points for performance
            CHART_COLORS: {
                tempIn: '#0ea5e9',
                tempOut: '#f43f5e',
                grid: 'rgba(255, 255, 255, 0.05)',
                text: '#94a3b8'
            }
        };

        // State
        let chart = null;
        let isFirstLoad = true;

        // DOM Elements
        const elements = {
            tempIn: document.getElementById('temp-in'),
            tempOut: document.getElementById('temp-out'),
            status: document.getElementById('status'),
            errorBanner: document.getElementById('error-banner'),
            lastUpdated: document.getElementById('last-updated'),
            connectionStatus: document.getElementById('connection-status')
        };

        /**
         * Initialize Chart.js chart
         * Creates chart once and reuses it for updates
         */
        function initChart() {
            const ctx = document.getElementById('tempChart').getContext('2d');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Temp In',
                            data: [],
                            borderColor: CONFIG.CHART_COLORS.tempIn,
                            backgroundColor: `${CONFIG.CHART_COLORS.tempIn}20`,
                            borderWidth: 3,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: CONFIG.CHART_COLORS.tempIn,
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Temp Out',
                            data: [],
                            borderColor: CONFIG.CHART_COLORS.tempOut,
                            backgroundColor: `${CONFIG.CHART_COLORS.tempOut}20`,
                            borderWidth: 3,
                            pointRadius: 4,
                            pointHoverRadius: 6,
                            pointBackgroundColor: CONFIG.CHART_COLORS.tempOut,
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false // Using custom legend
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#f8fafc',
                            bodyColor: '#f8fafc',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.parsed.y.toFixed(1)}°C`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: CONFIG.CHART_COLORS.grid,
                                drawBorder: false
                            },
                            ticks: {
                                color: CONFIG.CHART_COLORS.text,
                                maxRotation: 45,
                                minRotation: 45,
                                maxTicksLimit: 10
                            }
                        },
                        y: {
                            grid: {
                                color: CONFIG.CHART_COLORS.grid,
                                drawBorder: false
                            },
                            ticks: {
                                color: CONFIG.CHART_COLORS.text,
                                callback: function(value) {
                                    return value + '°C';
                                }
                            },
                            suggestedMin: 0,
                            suggestedMax: 30
                        }
                    },
                    animation: {
                        duration: isFirstLoad ? 1000 : 300
                    }
                }
            });
        }

        /**
         * Format timestamp for display
         */
        function formatTimestamp(timestamp) {
            try {
                const date = new Date(timestamp);
                if (isNaN(date.getTime())) {
                    return timestamp; // Return as-is if invalid
                }
                return date.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
            } catch {
                return timestamp;
            }
        }

        /**
         * Update status badge with appropriate styling
         */
        function updateStatus(status) {
            const validStatuses = ['OK', 'WARNING', 'ERROR'];
            const normalizedStatus = validStatuses.includes(status) ? status : 'ERROR';

            elements.status.textContent = normalizedStatus;
            elements.status.className = 'status-badge';

            switch (normalizedStatus) {
                case 'OK':
                    elements.status.classList.add('status-ok');
                    break;
                case 'WARNING':
                    elements.status.classList.add('status-warning');
                    break;
                case 'ERROR':
                    elements.status.classList.add('status-error');
                    break;
            }
        }

        /**
         * Show error banner
         */
        function showError(message) {
            elements.errorBanner.textContent = message;
            elements.errorBanner.classList.add('visible');
            elements.connectionStatus.classList.add('error');
        }

        /**
         * Hide error banner
         */
        function hideError() {
            elements.errorBanner.classList.remove('visible');
            elements.connectionStatus.classList.remove('error');
        }

        /**
         * Safely get numeric value from data
         */
        function safeNumber(value, defaultValue = 0) {
            const num = parseFloat(value);
            return isNaN(num) ? defaultValue : num;
        }

        /**
         * Update chart data without recreation
         */
        function updateChart(data) {
            if (!chart) return;

            // Limit data points for performance
            const limitedData = data.length > CONFIG.MAX_DATA_POINTS
                ? data.slice(-CONFIG.MAX_DATA_POINTS)
                : data;

            const labels = limitedData.map(item => formatTimestamp(item.timestamp));
            const tempInData = limitedData.map(item => safeNumber(item.chiller_temp_in));
            const tempOutData = limitedData.map(item => safeNumber(item.chiller_temp_out));

            // Update chart data
            chart.data.labels = labels;
            chart.data.datasets[0].data = tempInData;
            chart.data.datasets[1].data = tempOutData;

            // Update Y-axis scale based on data
            const allTemps = [...tempInData, ...tempOutData];
            const minTemp = Math.min(...allTemps);
            const maxTemp = Math.max(...allTemps);
            chart.options.scales.y.suggestedMin = Math.max(0, minTemp - 5);
            chart.options.scales.y.suggestedMax = maxTemp + 5;

            // Efficient update - 'none' mode prevents full re-render
            chart.update(isFirstLoad ? 'active' : 'none');
        }

        /**
         * Fetch and process data from API
         */
        async function fetchData() {
            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                // Validate response structure
                if (!result || typeof result !== 'object') {
                    throw new Error('Invalid response format');
                }

                // Handle API response envelope: { data: [...], count: n }
                const data = result.data;

                if (!Array.isArray(data)) {
                    throw new Error('Response data is not an array');
                }

                if (data.length === 0) {
                    throw new Error('No data available');
                }

                // Get latest record
                const latest = data[data.length - 1];

                // Validate required fields
                if (!latest || typeof latest !== 'object') {
                    throw new Error('Invalid data record');
                }

                // Update UI
                hideError();

                elements.tempIn.textContent = safeNumber(latest.chiller_temp_in).toFixed(1);
                elements.tempOut.textContent = safeNumber(latest.chiller_temp_out).toFixed(1);
                updateStatus(latest.status);

                // Update chart
                updateChart(data);

                // Update timestamp
                const now = new Date();
                elements.lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString()}`;

                isFirstLoad = false;

            } catch (error) {
                console.error('Dashboard error:', error);
                showError(`Connection error: ${error.message}`);
            }
        }

        /**
         * Initialize dashboard
         */
        function init() {
            initChart();
            fetchData();

            // Auto-refresh every 5 seconds
            setInterval(fetchData, CONFIG.REFRESH_INTERVAL);

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                if (chart) {
                    chart.destroy();
                }
            });
        }

        // Start dashboard when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
